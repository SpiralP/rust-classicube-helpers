name: build

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches-ignore: [ main, master ]
  workflow_call:
    inputs:
      release:
        default: false
        description: Build in release mode.
        required: false
        type: boolean
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux_nix:
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@02d9a56528ab48a70bc57310007c327d81bbb977 # main

  windows:
    name: Build & Test Windows ${{ matrix.config.arch }}
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        config:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          # - arch: i686
          #   target: i686-pc-windows-msvc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add rust target
        run: rustup target add ${{ matrix.config.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.config.target }}

      - name: Build
        run: cargo build --target ${{ matrix.config.target }} ${{ inputs.release && '--release' || '' }}

      - name: Test
        run: cargo test --target ${{ matrix.config.target }} ${{ inputs.release && '--release' || '' }} --features ci -- --nocapture --test-threads 1

  linux:
    name: Build & Test Linux ${{ matrix.config.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        config:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
          # - arch: i686
          #   target: i686-unknown-linux-gnu

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add rust target
        run: rustup target add ${{ matrix.config.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.config.target }}

      - name: Build
        run: cargo build --target ${{ matrix.config.target }} ${{ inputs.release && '--release' || '' }}

      - name: Test
        run: cargo test --target ${{ matrix.config.target }} ${{ inputs.release && '--release' || '' }} --features ci -- --nocapture --test-threads 1

  mac:
    name: Build & Test macOS ${{ matrix.config.arch }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - arch: aarch64
            target: aarch64-apple-darwin
          # - arch: x86_64
          #   target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add rust target
        run: rustup target add ${{ matrix.config.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.config.target }}

      - name: Build
        run: cargo build --target ${{ matrix.config.target }} ${{ inputs.release && '--release' || '' }}

      - name: Test
        run: cargo test --target ${{ matrix.config.target }} ${{ inputs.release && '--release' || '' }} --features ci -- --nocapture --test-threads 1
