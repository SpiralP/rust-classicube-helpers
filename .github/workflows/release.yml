name: release

on:
  push:
    branches: [main, master, alpha, beta]
  workflow_dispatch:

permissions:
  contents: read # for build's checkout

jobs:
  build:
    uses: ./.github/workflows/build.yml
    if: "${{ ! startsWith(github.event.head_commit.message, 'chore(release): ') }}"

  get-version-metadata:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version-metadata: ${{ steps.extract.outputs.version-metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: extract
        run: |
          classicube_sys_version="$(sed -n '/^name = "classicube-sys"$/{n;s/^version = "\(.*\)"$/\1/p;}' Cargo.lock)"
          test -z "$classicube_sys_version" && echo "classicube-sys not found in Cargo.lock" && exit 1
          classicube_version="${classicube_sys_version##*+ClassiCube.}"
          test "$classicube_version" = "$classicube_sys_version" && echo "no +ClassiCube. metadata in classicube-sys version: $classicube_sys_version" && exit 1
          version_metadata="ClassiCube $classicube_version"
          echo "version-metadata=$version_metadata" | tee -a "$GITHUB_OUTPUT"

  release:
    uses: SpiralP/github-reusable-workflows/.github/workflows/release.yml@af0fd7061daddfea981647f723aa3fc9bf8e1a84 # main
    needs: get-version-metadata
    if: needs.get-version-metadata.outputs.version-metadata
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false # do not cancel in-progress jobs
    permissions: {} # none needed, uses a custom GitHub App token
    with:
      environment-name: release
      package-name: classicube-helpers
      replace-files: |
        Cargo.lock
        Cargo.toml
      version-metadata: ${{ needs.get-version-metadata.outputs.version-metadata }}
      build-workflow: docs.yml
    secrets:
      app-client-id: ${{ secrets.APP_CLIENT_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-docs:
    name: Deploy docs to Pages
    needs: release
    # only on a real, non-prerelease release
    if: ${{ needs.release.outputs.tag && !contains(needs.release.outputs.tag, '-') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: read # cross-run artifact download
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page-url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deploy
        uses: SpiralP/github-reusable-workflows/.github/actions/deploy-pages-from-run@af0fd7061daddfea981647f723aa3fc9bf8e1a84 # main
        with:
          run-id: ${{ needs.release.outputs.dispatched-run-id }}
