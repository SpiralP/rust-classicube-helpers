name: release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read # for build's checkout

jobs:
  build:
    uses: ./.github/workflows/build.yml
    if: "${{ ! startsWith(github.event.head_commit.message, 'chore(release): ') }}"
    with:
      release: true

  get-version-metadata:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version-metadata: ${{ steps.extract.outputs.version-metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: extract
        run: |
          classicube_sys_version="$(sed -n '/^name = "classicube-sys"$/{n;s/^version = "\(.*\)"$/\1/p;}' Cargo.lock)"
          test -z "$classicube_sys_version" && echo "classicube-sys not found in Cargo.lock" && exit 1
          classicube_version="${classicube_sys_version##*+ClassiCube.}"
          test "$classicube_version" = "$classicube_sys_version" && echo "no +ClassiCube. metadata in classicube-sys version: $classicube_sys_version" && exit 1
          version_metadata="ClassiCube $classicube_version"
          echo "version-metadata=$version_metadata" | tee -a "$GITHUB_OUTPUT"

  release:
    uses: SpiralP/github-reusable-workflows/.github/workflows/release.yml@4c45b82d0802754ff04dadb453d3b49fe1c8f406 # main
    needs: get-version-metadata
    if: needs.get-version-metadata.outputs.version-metadata
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false # do not cancel in-progress jobs
    permissions: {} # none needed, uses a custom GitHub App token
    with:
      package-name: classicube-helpers
      replace-files: |
        Cargo.lock
        Cargo.toml
      version-metadata: ${{ needs.get-version-metadata.outputs.version-metadata }}
    secrets:
      app-client-id: ${{ secrets.APP_CLIENT_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
